<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1989fa"/>
      <stop offset="100%" style="stop-color:#0965da"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 账本/表格主体 -->
  <rect x="100" y="100" width="312" height="312" rx="24" fill="#ffffff" opacity="0.95"/>
  <!-- 账本装订线 -->
  <rect x="115" y="100" width="12" height="312" rx="4" fill="#e8e8e8"/>
  <!-- 表头 -->
  <rect x="140" y="115" width="255" height="50" rx="8" fill="#f0f7ff"/>
  <!-- 表头文字区域（用横线代替） -->
  <rect x="155" y="130" width="60" height="8" rx="4" fill="#1989fa"/>
  <rect x="230" y="130" width="80" height="8" rx="4" fill="#1989fa"/>
  <rect x="325" y="130" width="55" height="8" rx="4" fill="#1989fa"/>

  <!-- 第一行数据 -->
  <rect x="155" y="180" width="40" height="6" rx="3" fill="#52c41a"/>
  <rect x="210" y="180" width="70" height="6" rx="3" fill="#333"/>
  <rect x="320" y="180" width="60" height="6" rx="3" fill="#333"/>

  <!-- 第二行数据 -->
  <rect x="155" y="210" width="50" height="6" rx="3" fill="#faad14"/>
  <rect x="220" y="210" width="60" height="6" rx="3" fill="#333"/>
  <rect x="320" y="210" width="55" height="6" rx="3" fill="#ff4d4f"/>

  <!-- 第三行数据 -->
  <rect x="155" y="240" width="45" height="6" rx="3" fill="#52c41a"/>
  <rect x="215" y="240" width="75" height="6" rx="3" fill="#333"/>
  <rect x="325" y="240" width="50" height="6" rx="3" fill="#52c41a"/>

  <!-- 第四行数据 -->
  <rect x="155" y="270" width="35" height="6" rx="3" fill="#faad14"/>
  <rect x="205" y="270" width="65" height="6" rx="3" fill="#333"/>
  <rect x="320" y="270" width="60" height="6" rx="3" fill="#ff4d4f"/>

  <!-- 底部汇总行 -->
  <rect x="140" y="320" width="255" height="50" rx="8" fill="#f6ffed" stroke="#b7eb8f" stroke-width="2"/>
  <rect x="160" y="338" width="50" height="8" rx="4" fill="#135200"/>
  <rect x="320" y="338" width="60" height="8" rx="4" fill="#135200"/>

  <!-- 账本底部装饰 -->
  <circle cx="256" cy="440" r="8" fill="#ffffff" opacity="0.6"/>
</svg>
